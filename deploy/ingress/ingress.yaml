apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opensandbox-server
  namespace: opensandbox
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
  # Rule 1: local domain (used by server-proxy callback on this machine)
  - host: opensandbox.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opensandbox-server
            port:
              number: 80
  # Rule 2: no-host catch-all so any Host header (e.g. 9.135.63.151:8080) routes through
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opensandbox-server
            port:
              number: 80
