[server]
host = "0.0.0.0"
port = 8080
log_level = "INFO"
# api_key = "your-secret-api-key"  # Optional: Uncomment to enable API key authentication

[runtime]
type = "kubernetes"
execd_image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/execd:v1.0.6"

[storage]
allowed_host_paths = []

[kubernetes]
# Use in-cluster configuration (no kubeconfig needed when running inside k8s)
kubeconfig_path = null

# Namespace for sandbox workloads
namespace = "opensandbox"

# Informer-backed cache
informer_enabled = true
informer_resync_seconds = 300
informer_watch_timeout_seconds = 60

# Workload provider
workload_provider = "batchsandbox"

# Path to the BatchSandbox template file
batchsandbox_template_file = "/etc/opensandbox/batchsandbox-template.yaml"

[ingress]
# direct mode: client connects directly to sandbox pod IP
mode = "direct"
